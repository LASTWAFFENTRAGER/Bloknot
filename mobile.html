<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Блокнот">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <title>Блокнот</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #0d0d0d; color: #ccc; font-family: 'Courier New', monospace; overflow: hidden; }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }

    /* ── БОКОВАЯ ПАНЕЛЬ ── */
    #sidebar {
      width: 56px;
      min-width: 56px;
      height: 100%;
      background: #0a0a0a;
      border-right: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
    }

    .sidebar-logo {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .sidebar-tabs {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
    }

    .tab-btn {
      width: 100%;
      height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .tab-btn .icon { font-size: 20px; }
    .tab-btn .label { font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    .tab-btn.active { color: #c9a84c; }
    .tab-btn:active { opacity: 0.7; }

    .sidebar-profile {
      margin-top: auto;
      border-top: 1px solid #1a1a1a;
      width: 100%;
    }

    /* ── ОСНОВНОЙ КОНТЕНТ ── */
    #content {
      flex: 1;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #0d0d0d;
      overflow: hidden;
    }

    .screen.active { display: flex; }

    /* ── ШАПКА ЭКРАНА ── */
    .screen-header {
      height: 52px;
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
    }

    .screen-title {
      flex: 1;
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .btn-back {
      background: none;
      border: none;
      color: #c9a84c;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .btn-icon {
      background: none;
      border: 1px solid #2a2a2a;
      color: #c9a84c;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── СПИСОК ── */
    .list-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .list-empty {
      padding: 40px 20px;
      text-align: center;
      color: #333;
      font-size: 13px;
      line-height: 1.8;
    }

    .line-item {
      display: flex;
      align-items: center;
      padding: 16px 14px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      gap: 12px;
      -webkit-user-select: none;
      user-select: none;
    }

    .line-item:active { background: #111; }
    .line-item-icon { font-size: 20px; flex-shrink: 0; }
    .line-item-name { flex: 1; font-size: 14px; color: #ccc; }
    .line-item-count { font-size: 11px; color: #333; }

    .entry-item {
      padding: 14px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .entry-item:active { background: #111; }
    .entry-title { font-size: 14px; color: #ccc; margin-bottom: 4px; }
    .entry-preview { font-size: 11px; color: #3a3a3a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-date { font-size: 10px; color: #2a2a2a; margin-top: 4px; }

    /* ── РЕДАКТОР ── */
    .editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .editor-title-input {
      background: none;
      border: none;
      border-bottom: 1px solid #222;
      color: #ddd;
      font-size: 18px;
      font-family: inherit;
      padding: 8px 0;
      outline: none;
      width: 100%;
    }

    .editor-body-input {
      background: none;
      border: none;
      color: #999;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
      resize: none;
      outline: none;
      flex: 1;
      min-height: 50vh;
      width: 100%;
    }

    /* ── PLACEHOLDER ЭКРАНЫ ── */
    .screen-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #2a2a2a;
    }

    .screen-placeholder .ph-icon { font-size: 52px; }
    .screen-placeholder .ph-title { font-size: 14px; color: #333; }
    .screen-placeholder .ph-sub { font-size: 11px; color: #222; }

    /* ── МОДАЛЬНОЕ ОКНО ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    .modal-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 24px;
      width: calc(100% - 40px);
      max-width: 360px;
      z-index: 10000;
    }

    .modal-title {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #ccc;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      margin-bottom: 12px;
    }

    .modal-input:focus { border-color: #c9a84c; }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      font-family: inherit;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-confirm {
      background: #c9a84c;
      border: none;
      color: #000;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      font-size: 13px;
      color: #333;
      letter-spacing: 0.1em;
    }

    /* ── AUTH ── */
    #auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      z-index: 100000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #auth-overlay.open { display: flex; }
    .auth-box {
      width: 100%;
      max-width: 340px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 28px 24px 20px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .auth-logo .al-icon { font-size: 32px; margin-bottom: 6px; }
    .auth-logo .al-name {
      font-size: 12px;
      letter-spacing: 6px;
      color: #c9a84c;
      text-transform: uppercase;
    }
    .auth-logo .al-sub {
      font-size: 9px;
      color: #333;
      letter-spacing: 2px;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .auth-error {
      background: #1a0f0f;
      border: 1px solid #3a1a1a;
      border-radius: 4px;
      color: #c44;
      font-size: 11px;
      padding: 8px 10px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ccc;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
    }
    .auth-input:focus { border-color: #c9a84c; }
    .auth-submit {
      width: 100%;
      background: #c9a84c;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
      margin-bottom: 14px;
    }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-toggle {
      text-align: center;
      font-size: 12px;
      color: #555;
    }
    .auth-toggle a {
      color: #c9a84c;
      cursor: pointer;
      text-decoration: none;
      margin-left: 4px;
    }

    .delete-hint {
      font-size: 10px;
      color: #c0392b;
      text-align: center;
      padding: 4px;
      display: none;
    }

    .msg-bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-out {
      align-self: flex-end;
      background: #1a1a0a;
      border: 1px solid #3a3a1a;
      color: #c9a84c;
      border-bottom-right-radius: 3px;
    }

    .msg-in {
      align-self: flex-start;
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      color: #ccc;
      border-bottom-left-radius: 3px;
    }

    .msg-time {
      font-size: 9px;
      color: #333;
      margin-top: 2px;
      text-align: right;
    }

    .msg-sender {
      font-size: 9px;
      color: #555;
      margin-bottom: 2px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      gap: 12px;
    }

    .chat-item:active { background: #111; }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      color: #c9a84c;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 14px; color: #ccc; margin-bottom: 2px; }
    .chat-last { font-size: 11px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-time { font-size: 10px; color: #2a2a2a; flex-shrink: 0; }

    .user-result-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid #111;
    }

    .user-result-item:active { background: #111; }

    .mobile-ai-user {
      align-self: flex-end;
      max-width: 78%;
      background: #1a1a0a;
      border: 1px solid #3a3a1a;
      color: #c9a84c;
      padding: 8px 12px;
      border-radius: 12px;
      border-bottom-right-radius: 3px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    .mobile-ai-bot {
      align-self: flex-start;
      max-width: 85%;
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      color: #ccc;
      padding: 8px 12px;
      border-radius: 12px;
      border-bottom-left-radius: 3px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .mobile-ai-thinking {
      align-self: flex-start;
      font-size: 11px;
      color: #333;
      font-style: italic;
      padding: 4px 0;
    }
  </style>
</head>
<body>

<div id="loading">БЛОКНОТ...</div>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="auth-overlay" class="open">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="al-icon">✦</div>
      <div class="al-name">БЛОКНОТ</div>
      <div class="al-sub">стратегический</div>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email">
    <input class="auth-input" id="auth-password" type="password" placeholder="Пароль" autocomplete="current-password">
    <button class="auth-submit" id="auth-submit">Войти</button>
    <div class="auth-toggle" id="auth-toggle">Нет аккаунта? <a id="auth-toggle-link">Зарегистрироваться</a></div>
  </div>
</div>

<div id="app" style="display:none">

  <!-- БОКОВАЯ ПАНЕЛЬ -->
  <div id="sidebar">
    <div class="sidebar-logo">✦</div>
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="personal" onclick="switchTab('personal')">
        <span class="icon">📓</span>
        <span class="label">Личное</span>
      </button>
      <button class="tab-btn" data-tab="shared" onclick="switchTab('shared')">
        <span class="icon">🤝</span>
        <span class="label">Совм.</span>
      </button>
      <button class="tab-btn" data-tab="people" onclick="switchTab('people')">
        <span class="icon">👥</span>
        <span class="label">Люди</span>
      </button>
      <button class="tab-btn" data-tab="ai" onclick="switchTab('ai')">
        <span class="icon">🤖</span>
        <span class="label">ИИ</span>
      </button>
    </div>
    <div class="sidebar-profile">
      <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">
        <span class="icon">👤</span>
        <span class="label">Профиль</span>
      </button>
    </div>
  </div>

  <!-- КОНТЕНТ -->
  <div id="content">

    <!-- ЛИЧНОЕ: список линий -->
    <div class="screen active" id="screen-lines">
      <div class="screen-header">
        <span class="screen-title">Личное</span>
        <button class="btn-icon" onclick="openNewLine()">+</button>
      </div>
      <div class="list-body" id="lines-list"></div>
    </div>

    <!-- ЛИЧНОЕ: список записей -->
    <div class="screen" id="screen-entries">
      <div class="screen-header">
        <button class="btn-back" onclick="goBack('screen-lines')">‹</button>
        <span class="screen-title" id="entries-title">Записи</span>
        <button class="btn-icon" onclick="openNewEntry()">+</button>
      </div>
      <div class="list-body" id="entries-list"></div>
    </div>

    <!-- РЕДАКТОР -->
    <div class="screen" id="screen-editor">
      <div class="screen-header">
        <button class="btn-back" onclick="goBack('screen-entries')">‹</button>
        <span class="screen-title" id="editor-line-title">Запись</span>
        <button class="btn-icon" onclick="deleteCurrentEntry()" style="color:#c0392b;border-color:#2a1a1a;margin-right:4px">✕</button>
        <button class="btn-icon" onclick="saveCurrentEntry()">✓</button>
      </div>
      <div class="editor-body">
        <input id="editor-title" type="text" class="editor-title-input" placeholder="Заголовок...">
        <textarea id="editor-body" class="editor-body-input" placeholder="Текст записи..."></textarea>

        <div style="border-top:1px solid #1a1a1a;margin-top:12px;padding-top:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:10px;color:#333;letter-spacing:0.1em">ЧЕРНОВИКИ</span>
            <button onclick="addDraft()" style="background:none;border:1px solid #2a2a2a;color:#c9a84c;font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer">+ черновик</button>
          </div>
          <div id="drafts-list"></div>
        </div>
      </div>
    </div>

    <!-- СОВМЕСТНОЕ -->
    <div class="screen" id="screen-shared">
      <div class="screen-header">
        <span class="screen-title">Совместное</span>
        <button class="btn-icon" onclick="openNewSharedLine()">+</button>
      </div>
      <div class="list-body" id="shared-lines-list"></div>
    </div>

    <div class="screen" id="screen-shared-entries">
      <div class="screen-header">
        <button class="btn-back" onclick="goBack('screen-shared')">‹</button>
        <span class="screen-title" id="shared-entries-title">Записи</span>
        <button class="btn-icon" onclick="openNewSharedEntry()">+</button>
      </div>
      <div class="list-body" id="shared-entries-list"></div>
    </div>

    <div class="screen" id="screen-shared-editor">
      <div class="screen-header">
        <button class="btn-back" onclick="goBack('screen-shared-entries')">‹</button>
        <span class="screen-title" id="shared-editor-title">Запись</span>
        <button class="btn-icon" onclick="saveSharedEntry()">✓</button>
      </div>
      <div class="editor-body">
        <input id="shared-editor-title-input" type="text" class="editor-title-input" placeholder="Заголовок...">
        <textarea id="shared-editor-body" class="editor-body-input" placeholder="Текст записи..."></textarea>
        <div style="border-top:1px solid #1a1a1a;margin-top:12px;padding-top:8px">
          <div style="font-size:10px;color:#333;letter-spacing:0.08em;margin-bottom:4px">УЧАСТНИКИ</div>
          <div id="shared-members-list" style="font-size:12px;color:#444"></div>
        </div>
      </div>
    </div>

    <!-- ЛЮДИ: список чатов -->
    <div class="screen" id="screen-people">
      <div class="screen-header">
        <span class="screen-title">Люди</span>
        <button class="btn-icon" onclick="openNewChat()" title="Новый чат">✎</button>
      </div>
      <div style="padding:10px 12px;border-bottom:1px solid #111">
        <input id="people-search" class="modal-input" style="margin:0"
          type="text" placeholder="Поиск по нику (@handle)..."
          oninput="searchUsers(this.value)">
      </div>
      <div id="search-results" style="display:none;border-bottom:1px solid #111"></div>
      <div class="list-body" id="chats-list"></div>
    </div>

    <!-- ЛЮДИ: чат -->
    <div class="screen" id="screen-chat">
      <div class="screen-header">
        <button class="btn-back" onclick="goBack('screen-people')">‹</button>
        <div style="flex:1">
          <div class="screen-title" id="chat-title">Чат</div>
          <div id="chat-subtitle" style="font-size:9px;color:#333;letter-spacing:0.05em"></div>
        </div>
      </div>
      <div id="messages-list" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch"></div>
      <div style="display:flex;gap:8px;padding:10px 12px;border-top:1px solid #111;background:#0a0a0a">
        <input id="message-input" class="modal-input" style="margin:0;flex:1"
          type="text" placeholder="Сообщение..."
          onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="btn-icon" onclick="sendMessage()" style="flex-shrink:0">→</button>
      </div>
    </div>

    <!-- ИИ -->
    <div class="screen" id="screen-ai">
      <div class="screen-header">
        <span class="screen-title">ИИ советник</span>
        <button class="btn-icon" onclick="clearMobileAi()"
          style="font-size:12px;width:auto;padding:0 8px">очистить</button>
      </div>
      <div id="mobile-ai-messages"
        style="flex:1;overflow-y:auto;padding:12px;display:flex;
        flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch">
      </div>
      <div style="display:flex;gap:8px;padding:10px 12px;
        border-top:1px solid #1a1a1a;background:#0a0a0a">
        <input id="mobile-ai-input" class="modal-input"
          style="margin:0;flex:1" type="text"
          placeholder="Спроси что-нибудь..."
          onkeydown="if(event.key==='Enter')sendMobileAi()">
        <button class="btn-icon" onclick="sendMobileAi()">→</button>
      </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="screen" id="screen-profile">
      <div class="screen-header">
        <span class="screen-title">Профиль</span>
        <button class="btn-icon" onclick="signOut()">↩</button>
      </div>
      <div class="screen-placeholder">
        <span class="ph-icon">👤</span>
        <span class="ph-title" id="profile-email"></span>
      </div>
    </div>

  </div>
</div>

const ICONS = ['💡','✈','🏦','☕','🏭','🌐','🚀','📚','💼','🎯','🔬','🎨','🏠','❤️','⚡','🌿'];

function openIconModal(callback) {
  let selectedIcon = '💡';
  const overlay = document.getElementById('modal-overlay');
  const box = overlay.querySelector('.modal-box');

  document.getElementById('modal-title').textContent = 'Новая линия';

  box.innerHTML = `
    <div class="modal-title">Новая линия</div>
    <input id="modal-input" class="modal-input" type="text" placeholder="Название линии...">
    <div style="margin:12px 0 4px;font-size:11px;color:#444;letter-spacing:0.08em">ИКОНКА</div>
    <div id="icon-grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:4px">
      ${ICONS.map(ic => `
        <button class="icon-btn ${ic === selectedIcon ? 'selected' : ''}"
          data-icon="${ic}"
          onclick="selectIcon('${ic}',this)"
          style="font-size:20px;background:${ic === selectedIcon ? '#1e1e1e' : 'none'};
          border:1px solid ${ic === selectedIcon ? '#c9a84c' : '#1a1a1a'};
          border-radius:6px;padding:6px;cursor:pointer">
          ${ic}
        </button>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeIconModal()">Отмена</button>
      <button class="btn-confirm" onclick="submitIconModal()">Создать</button>
    </div>
  `;

  window._iconModalCallback = callback;
  window._selectedIcon = selectedIcon;
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

window.selectIcon = function(icon, btn) {
  window._selectedIcon = icon;
  document.querySelectorAll('.icon-btn').forEach(b => {
    b.style.background = 'none';
    b.style.border = '1px solid #1a1a1a';
  });
  btn.style.background = '#1e1e1e';
  btn.style.border = '1px solid #c9a84c';
};

window.closeIconModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.querySelector('.modal-box').innerHTML = `
    <div class="modal-title" id="modal-title">Новая линия</div>
    <input id="modal-input" class="modal-input" type="text" placeholder="Название...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" id="modal-confirm">Создать</button>
    </div>
  `;
  reattachModalEvents();
};

window.submitIconModal = async function() {
  const name = document.getElementById('modal-input').value.trim();
  if (!name) { document.getElementById('modal-input').focus(); return; }
  const icon = window._selectedIcon || '💡';
  if (window._iconModalCallback) await window._iconModalCallback(name, icon);
  closeIconModal();
};

function reattachModalEvents() {
  const confirm = document.getElementById('modal-confirm');
  if (confirm) {
    confirm.onclick = async () => {
      const val = document.getElementById('modal-input').value.trim();
      if (val && modalCallback) await modalCallback(val);
      closeModal();
    };
  }
  const input = document.getElementById('modal-input');
  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('modal-confirm')?.click();
    });
  }
}

window.saveCurrentEntry = async function() {

  if (!activeLine || !currentUser) return;

      { title, body, lineId: activeLine.id, updatedAt: serverTimestamp() }, { merge: true });

    });

  goBack('screen-entries');

// ── FIREBASE LISTENERS ──
function startListeners(uid) {
  unsubs.forEach(u => u());
  unsubs = [];

  unsubs.push(onSnapshot(collection(db, 'users', uid, 'lines'), snap => {
    lines = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.order || 0) - (b.order || 0));
    renderLines();
  }));

  unsubs.push(onSnapshot(collection(db, 'users', uid, 'entries'), snap => {
    entries = {};
    snap.docs.forEach(d => {
      const e = { id: d.id, ...d.data() };
      if (!entries[e.lineId]) entries[e.lineId] = [];
      entries[e.lineId].push(e);
    });
    renderLines();
    if (activeLine) renderEntries();
    document.getElementById('loading').style.display = 'none';
  }));

  unsubs.push(onSnapshot(collection(db, 'sharedLines'), snap => {
    sharedLines = [];
    snap.docs.forEach(d => {
      const sl = { id: d.id, ...d.data() };
      if (sl.ownerId === uid || (sl.members || {})[uid]) {
        sharedLines.push(sl);
      }
    });
    sharedLines.sort((a, b) => (a.order || 0) - (b.order || 0));

    unsubSharedEntries.forEach(u => u());
    unsubSharedEntries = [];
    sharedLines.forEach(sl => {
      const u = onSnapshot(
        collection(db, 'sharedLines', sl.id, 'entries'),
        snap2 => {
          sharedEntries[sl.id] = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
          renderSharedLines();
          if (activeSharedLine?.id === sl.id) renderSharedEntries();
        }
      );
      unsubSharedEntries.push(u);
    });

    renderSharedLines();
  }));

  startChatsListener(uid);
  ensureMyHandle();
}

// ── МОДАЛЬНОЕ ОКНО ──
let modalCallback = null;

function openModal(title, placeholder, callback) {
  modalCallback = callback;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').placeholder = placeholder;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCallback = null;
};

document.getElementById('modal-confirm').onclick = async () => {
  const val = document.getElementById('modal-input').value.trim();
  if (val && modalCallback) await modalCallback(val);
  closeModal();
};

document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-confirm').click();
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── МЕССЕНДЖЕР ──

async function ensureMyHandle() {
  if (myHandle) return myHandle;
  const { getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const snap = await getDoc(doc(db, 'users', currentUser.uid, 'profile', 'main'));
  if (snap.exists() && snap.data().handle) {
    myHandle = snap.data().handle;
  } else {
    const h = prompt('Задай свой уникальный ник (handle) без @:');
    if (!h) return null;
    myHandle = h.toLowerCase().replace(/[^a-z0-9_]/g, '');
    await setDoc(doc(db, 'users', currentUser.uid, 'profile', 'main'), {
      handle: myHandle, email: currentUser.email, uid: currentUser.uid
    }, { merge: true });
    await setDoc(doc(db, 'handles', myHandle), {
      uid: currentUser.uid, email: currentUser.email, handle: myHandle
    });
  }
  return myHandle;
}

function startChatsListener(uid) {
  unsubs.push(onSnapshot(collection(db, 'chats'), snap => {
    chats = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(c => (c.members || []).includes(uid))
      .sort((a, b) => (b.lastAt?.seconds || 0) - (a.lastAt?.seconds || 0));
    renderChats();
  }));
}

function renderChats() {
  const list = document.getElementById('chats-list');
  if (!list) return;
  list.innerHTML = '';
  if (chats.length === 0) {
    list.innerHTML = '<div class="list-empty">Нет чатов.<br>Найди человека по нику и начни общение.</div>';
    return;
  }
  chats.forEach(chat => {
    const otherUid = (chat.members || []).find(m => m !== currentUser.uid);
    const otherHandle = (chat.memberHandles || {})[otherUid] || otherUid || '?';
    const el = document.createElement('div');
    el.className = 'chat-item';
    const lastTime = chat.lastAt ? formatTime(chat.lastAt.seconds * 1000) : '';
    el.innerHTML = `
      <div class="chat-avatar">${otherHandle[0]?.toUpperCase() || '?'}</div>
      <div class="chat-info">
        <div class="chat-name">@${otherHandle}</div>
        <div class="chat-last">${chat.lastMessage || 'Нет сообщений'}</div>
      </div>
      <div class="chat-time">${lastTime}</div>
    `;
    el.onclick = () => openChat(chat, otherHandle);
    list.appendChild(el);
  });
}

function formatTime(ms) {
  const d = new Date(ms);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
}

function openChat(chat, otherHandle) {
  activeChat = chat;
  document.getElementById('chat-title').textContent = '@' + otherHandle;
  document.getElementById('chat-subtitle').textContent = chat.id;
  renderMessages([]);
  if (unsubMessages) unsubMessages();
  unsubMessages = onSnapshot(
    collection(db, 'chats', chat.id, 'messages'),
    snap => {
      activeChatMessages = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
      renderMessages(activeChatMessages);
    }
  );
  goTo('screen-chat');
  history.pushState({}, '');
}

function renderMessages(msgs) {
  const list = document.getElementById('messages-list');
  if (!list) return;
  list.innerHTML = '';
  if (msgs.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#2a2a2a;font-size:12px;margin:auto">Начни разговор</div>';
    return;
  }
  msgs.forEach(msg => {
    const isOut = msg.senderUid === currentUser.uid;
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = isOut ? 'flex-end' : 'flex-start';
    const time = msg.createdAt ? formatTime(msg.createdAt.seconds * 1000) : '';
    wrapper.innerHTML = `
      ${!isOut ? `<div class="msg-sender">@${msg.senderHandle || '?'}</div>` : ''}
      <div class="msg-bubble ${isOut ? 'msg-out' : 'msg-in'}">${msg.text}</div>
      <div class="msg-time">${time}</div>
    `;
    list.appendChild(wrapper);
  });
  list.scrollTop = list.scrollHeight;
}

window.sendMessage = async function() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text || !activeChat || !currentUser) return;
  input.value = '';
  const handle = await ensureMyHandle();
  await addDoc(collection(db, 'chats', activeChat.id, 'messages'), {
    text,
    senderUid: currentUser.uid,
    senderHandle: handle || currentUser.email,
    createdAt: serverTimestamp()
  });
  await setDoc(doc(db, 'chats', activeChat.id), {
    lastMessage: text,
    lastAt: serverTimestamp()
  }, { merge: true });
};

window.openNewChat = async function() {
  const handle = prompt('Введи ник пользователя (@handle):');
  if (!handle) return;
  const cleanHandle = handle.replace('@', '').toLowerCase().trim();
  await startChatWithHandle(cleanHandle);
};

window.searchUsers = async function(val) {
  const resultsEl = document.getElementById('search-results');
  if (!val || val.length < 2) { resultsEl.style.display = 'none'; return; }
  const clean = val.replace('@', '').toLowerCase().trim();

  const { getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const snap = await getDoc(doc(db, 'handles', clean));
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '';

  if (!snap.exists()) {
    resultsEl.innerHTML = '<div style="padding:12px;font-size:12px;color:#333">Пользователь не найден</div>';
    return;
  }

  const user = snap.data();
  if (user.uid === currentUser.uid) {
    resultsEl.innerHTML = '<div style="padding:12px;font-size:12px;color:#333">Это ты</div>';
    return;
  }

  const el = document.createElement('div');
  el.className = 'user-result-item';
  el.innerHTML = `
    <div class="chat-avatar">${user.handle[0].toUpperCase()}</div>
    <div class="chat-info">
      <div class="chat-name">@${user.handle}</div>
      <div class="chat-last">${user.email}</div>
    </div>
    <button class="btn-confirm" style="font-size:11px;padding:6px 10px"
      onclick="startChatWithHandle('${user.handle}')">Написать</button>
  `;
  resultsEl.appendChild(el);
};

async function startChatWithHandle(handle) {
  const { getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const snap = await getDoc(doc(db, 'handles', handle));
  if (!snap.exists()) { alert('Пользователь @' + handle + ' не найден'); return; }

  const otherUser = snap.data();
  const myH = await ensureMyHandle();
  if (!myH) return;

  const existingChat = chats.find(c =>
    (c.members || []).includes(otherUser.uid) && (c.members || []).includes(currentUser.uid)
  );

  if (existingChat) {
    openChat(existingChat, handle);
    document.getElementById('people-search').value = '';
    document.getElementById('search-results').style.display = 'none';
    return;
  }

  const chatRef = doc(collection(db, 'chats'));
  await setDoc(chatRef, {
    members: [currentUser.uid, otherUser.uid],
    memberHandles: {
      [currentUser.uid]: myH,
      [otherUser.uid]: handle
    },
    createdAt: serverTimestamp(),
    lastMessage: '',
    lastAt: serverTimestamp()
  });

  const newChat = { id: chatRef.id, members: [currentUser.uid, otherUser.uid],
    memberHandles: { [currentUser.uid]: myH, [otherUser.uid]: handle } };
  openChat(newChat, handle);
  document.getElementById('people-search').value = '';
  document.getElementById('search-results').style.display = 'none';
}

// ── ВЫХОД ──
window.signOut = async function() {
  unsubs.forEach(u => u());
  unsubSharedEntries.forEach(u => u());
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  unsubs = [];
  unsubSharedEntries = [];
  sharedLines = [];
  sharedEntries = {};
  activeSharedLine = null;
  activeSharedEntry = null;
  chats = [];
  activeChat = null;
  activeChatMessages = [];
  myHandle = null;
  await fbSignOut(auth);
};

// ── АВТОРИЗАЦИЯ ──
window.toggleAuthMode = function() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-submit').textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('auth-toggle').innerHTML = authMode === 'login'
    ? 'Нет аккаунта? <a id="auth-toggle-link">Зарегистрироваться</a>'
    : 'Уже есть аккаунт? <a id="auth-toggle-link">Войти</a>';
  document.getElementById('auth-toggle-link').onclick = toggleAuthMode;
  document.getElementById('auth-error').style.display = 'none';
};

window.handleAuthSubmit = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('auth-error');
  const submitBtn = document.getElementById('auth-submit');
  if (!email || !password) {
    errorEl.textContent = 'Введите email и пароль';
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = authMode === 'login' ? 'Вход...' : 'Регистрация...';
  try {
    if (authMode === 'login') {
      await signInWithEmailAndPassword(auth, email, password);
    } else {
      await createUserWithEmailAndPassword(auth, email, password);
    }
  } catch (err) {
    errorEl.textContent = err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '').trim();
    errorEl.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
  }
};

document.getElementById('auth-toggle-link').onclick = toggleAuthMode;
document.getElementById('auth-submit').onclick = handleAuthSubmit;
document.getElementById('auth-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleAuthSubmit(); }
});

// ── МОБИЛЬНЫЙ ИИ ──

let mobileAiHistory = [];

window.sendMobileAi = async function() {
  const input = document.getElementById('mobile-ai-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;

  appendMobileAiMsg('user', text);
  mobileAiHistory.push({ role: 'user', content: text });

  const list = document.getElementById('mobile-ai-messages');
  const thinking = document.createElement('div');
  thinking.className = 'mobile-ai-thinking';
  thinking.textContent = 'думает...';
  list.appendChild(thinking);
  list.scrollTop = 99999;

  try {
    const res = await fetch('https://bloknot.abdisaminuuluaibek2051.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: mobileAiHistory })
    });
    const data = await res.json();
    const reply = data.reply || 'Нет ответа';
    thinking.remove();
    appendMobileAiMsg('bot', reply);
    mobileAiHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    thinking.remove();
    appendMobileAiMsg('bot', '⚠️ Ошибка соединения с ИИ.');
  } finally {
    input.disabled = false;
  }
};

function appendMobileAiMsg(role, text) {
  const el = document.createElement('div');
  el.className = role === 'user' ? 'mobile-ai-user' : 'mobile-ai-bot';
  el.textContent = text;
  const list = document.getElementById('mobile-ai-messages');
  list.appendChild(el);
  list.scrollTop = 99999;
}

window.clearMobileAi = function() {
  mobileAiHistory = [];
  document.getElementById('mobile-ai-messages').innerHTML = '';
};

// ── ON AUTH STATE CHANGED ──
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('auth-overlay').classList.remove('open');
    document.getElementById('app').style.display = 'flex';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('profile-email').textContent = user.email;
    startListeners(user.uid);
  } else {
    currentUser = null;
    unsubs.forEach(u => u());
    unsubs = [];
    lines = [];
    entries = {};
    activeLine = null;
    activeEntry = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('auth-overlay').classList.add('open');
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-submit').disabled = false;
    document.getElementById('auth-submit').textContent = 'Войти';
    authMode = 'login';
    document.getElementById('auth-toggle').innerHTML = 'Нет аккаунта? <a id="auth-toggle-link">Зарегистрироваться</a>';
    document.getElementById('auth-toggle-link').onclick = toggleAuthMode;
  }
});
